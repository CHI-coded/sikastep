<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SikaStep Admin — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:#0a1f14;color:#fff}

.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}

/* Ambient background elements */
.page::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(34,136,79,.18) 0%,transparent 70%);top:-150px;right:-150px;pointer-events:none}
.page::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(110,255,166,.08) 0%,transparent 70%);bottom:-100px;left:-80px;pointer-events:none}

/* Grid pattern overlay */
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:48px 44px;width:100%;max-width:440px;position:relative;z-index:1;backdrop-filter:blur(12px);animation:card-in .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes card-in{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.brand{display:flex;align-items:center;gap:12px;margin-bottom:36px;justify-content:center}
.bmark{width:44px;height:44px;background:linear-gradient(135deg,#22884f,#0f4a2e);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(34,136,79,.4)}
.brand-txt{font-size:22px;font-weight:800;letter-spacing:-.3px}
.brand-sub{display:block;font-size:10px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.12em;margin-top:1px}

h1{font-size:24px;font-weight:800;text-align:center;margin-bottom:6px;letter-spacing:-.3px}
.sub{font-size:13px;color:rgba(255,255,255,.45);text-align:center;margin-bottom:32px}

.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.field input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 16px;color:#fff;font-family:inherit;font-size:14px;outline:none;transition:all .2s}
.field input::placeholder{color:rgba(255,255,255,.25)}
.field input:focus{border-color:#22884f;background:rgba(34,136,79,.08);box-shadow:0 0 0 3px rgba(34,136,79,.15)}

.btn-login{width:100%;background:linear-gradient(135deg,#22884f,#0f4a2e);border:none;border-radius:10px;padding:14px;color:#fff;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .2s;margin-top:8px;position:relative;overflow:hidden}
.btn-login::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .2s}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(34,136,79,.4)}
.btn-login:hover::after{opacity:1}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}

.err{background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);border-radius:8px;padding:10px 14px;font-size:12.5px;color:#fca5a5;margin-bottom:16px;display:none}
.err.show{display:block}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.footer-note{text-align:center;margin-top:24px;font-size:12px;color:rgba(255,255,255,.3)}
.footer-note a{color:rgba(110,255,166,.7);text-decoration:none}
.footer-note a:hover{color:#6effa6}
</style>
</head>
<body>
<div class="page">
  <div class="grid-bg"></div>
  <div class="card">
    <div class="brand">
      <div class="bmark">🌱</div>
      <div>
        <div class="brand-txt">SikaStep</div>
        <span class="brand-sub">Admin Portal</span>
      </div>
    </div>
    <h1>Admin Login</h1>
    <p class="sub">Restricted access — authorized personnel only</p>
    <div class="err" id="err-msg"></div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="l-em" placeholder="admin@sikastep.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="l-pw" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In to Admin Panel</button>
    <p class="footer-note">Back to <a href="/sikastep.html">user dashboard →</a></p>
  </div>
</div>
<script>
const BASE='http://127.0.0.1:8000/api';

document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const em=document.getElementById('l-em').value.trim();
  const pw=document.getElementById('l-pw').value;
  const err=document.getElementById('err-msg');
  const btn=document.getElementById('login-btn');
  if(!em||!pw){showErr('Please enter your email and password.');return;}
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>Signing in...';
  err.classList.remove('show');
  try{
    const r=await fetch(BASE+'/login',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},credentials:'include',body:JSON.stringify({email:em,password:pw})});
    const d=await r.json();
    if(d&&d.user&&d.user.is_admin){
      window.location.href='admin-panel.html';
    } else if(d&&d.user&&!d.user.is_admin){
      showErr('Access denied. This account does not have admin privileges.');
    } else {
      showErr(d?.message||'Invalid credentials. Please try again.');
    }
  }catch(e){
    showErr('Could not connect to server. Please check the API is running.');
  }
  btn.disabled=false;
  btn.innerHTML='Sign In to Admin Panel';
}

function showErr(msg){
  const err=document.getElementById('err-msg');
  err.textContent=msg;
  err.classList.add('show');
}
</script>
</body>
</html>
